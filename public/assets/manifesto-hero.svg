<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Left side - repository icon -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="200" height="260" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="50" rx="12" fill="#21262d"/>
    <rect x="0" y="38" width="200" height="12" fill="#21262d"/>
    <circle cx="30" cy="25" r="8" fill="#f85149"/>
    <circle cx="55" cy="25" r="8" fill="#f0883e"/>
    <circle cx="80" cy="25" r="8" fill="#3fb950"/>
    <rect x="20" y="70" width="160" height="8" rx="4" fill="#30363d"/>
    <rect x="20" y="90" width="120" height="8" rx="4" fill="#30363d"/>
    <rect x="20" y="110" width="140" height="8" rx="4" fill="#30363d"/>
    <rect x="20" y="140" width="80" height="8" rx="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="20" y="160" width="100" height="8" rx="4" fill="#30363d"/>
    <rect x="20" y="180" width="90" height="8" rx="4" fill="#30363d"/>
    <rect x="20" y="200" width="110" height="8" rx="4" fill="#30363d"/>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(380, 280)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#00d4ff" stroke-width="3" stroke-dasharray="8,4"/>
    <polygon points="120,0 100,-15 100,15" fill="#00d4ff"/>
  </g>
  
  <!-- Right side - agent with brain -->
  <g transform="translate(580, 180)">
    <circle cx="80" cy="80" r="70" fill="#161b22" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="80" cy="80" r="55" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <!-- Brain pattern inside -->
    <path d="M50,80 Q65,50 80,80 Q95,110 110,80" stroke="#00d4ff" stroke-width="2" fill="none"/>
    <path d="M60,60 Q80,40 100,60" stroke="#00ff88" stroke-width="1.5" fill="none"/>
    <path d="M60,100 Q80,120 100,100" stroke="#00ff88" stroke-width="1.5" fill="none"/>
    <!-- Eyes -->
    <circle cx="55" cy="70" r="6" fill="#00d4ff"/>
    <circle cx="105" cy="70" r="6" fill="#00d4ff"/>
    <!-- Body -->
    <rect x="30" y="160" width="100" height="80" rx="20" fill="#1c2128" stroke="#30363d" stroke-width="2"/>
    <rect x="10" y="180" width="30" height="50" rx="10" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
    <rect x="160" y="180" width="30" height="50" rx="10" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="#e6edf3" text-anchor="middle">Coding Agents Need</text>
  <text x="600" y="545" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="#00d4ff" text-anchor="middle">Better Repositories</text>
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="16" 
        fill="#7a7a8a" text-anchor="middle">Not Just Better Prompts</text>
</svg>