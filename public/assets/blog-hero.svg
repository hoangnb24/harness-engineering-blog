<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow1" cx="20%" cy="30%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="60%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  
  <!-- Grid -->
  <g stroke="#1a1a2e" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/><line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/><line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/><line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/><line x1="0" y1="567" x2="1200" y2="567"/>
  </g>
  
  <!-- Glow spots -->
  <ellipse cx="240" cy="189" rx="300" ry="200" fill="url(#glow1)"/>
  <ellipse cx="960" cy="378" rx="350" ry="250" fill="url(#glow2)"/>
  
  <!-- Connections -->
  <g stroke="#00b4d8" stroke-width="1.5" opacity="0.6">
    <line x1="180" y1="189" x2="420" y2="315"/>
    <line x1="420" y1="315" x2="660" y2="252"/>
    <line x1="660" y1="252" x2="900" y2="378"/>
    <line x1="180" y1="189" x2="660" y2="252"/>
    <line x1="420" y1="315" x2="900" y2="378"/>
    <line x1="660" y1="252" x2="1020" y2="189"/>
    <line x1="900" y1="378" x2="1020" y2="189"/>
  </g>
  
  <!-- Nodes -->
  <g filter="url(#nodeGlow)">
    <circle cx="180" cy="189" r="12" fill="#00d4ff"/>
    <circle cx="420" cy="315" r="10" fill="#00d4ff"/>
    <circle cx="660" cy="252" r="14" fill="#00d4ff"/>
    <circle cx="900" cy="378" r="11" fill="#00ffaa"/>
    <circle cx="1020" cy="189" r="9" fill="#00d4ff"/>
  </g>
  
  <!-- Floating code particles -->
  <g font-family="monospace" font-size="14" fill="#00b4d8" opacity="0.5">
    <text x="320" y="140">{ ... }</text>
    <text x="750" y="180">fn()</text>
    <text x="500" y="420">=&gt;</text>
    <text x="280" y="450">[ ]</text>
    <text x="850" y="480">/**/</text>
    <text x="100" y="300">&lt;/&gt;</text>
    <text x="600" y="150">++</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#00d4ff" text-anchor="middle" letter-spacing="8">CODEHARNESS</text>
  <text x="600" y="385" font-family="Arial, sans-serif" font-size="16" 
        fill="#7a7a8a" text-anchor="middle" letter-spacing="4">AGENT-READY REPOSITORY INFRASTRUCTURE</text>
</svg>