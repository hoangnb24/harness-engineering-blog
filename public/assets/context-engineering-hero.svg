<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0f"/>
  
  <!-- Context layers visualization -->
  <g transform="translate(600, 315)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="250" fill="none" stroke="#1a1a2e" stroke-width="1"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#1a1a2e" stroke-width="1"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    
    <!-- Inner core -->
    <circle cx="0" cy="0" r="50" fill="#0d1117" stroke="#00d4ff" stroke-width="2"/>
    <text x="0" y="8" font-family="monospace" font-size="16" fill="#00d4ff" text-anchor="middle">AGENT</text>
    
    <!-- Radial lines -->
    <g stroke="#00b4d8" stroke-width="1" opacity="0.4">
      <line x1="-250" y1="0" x2="-50" y2="0"/>
      <line x1="250" y1="0" x2="50" y2="0"/>
      <line x1="0" y1="-250" x2="0" y2="-50"/>
      <line x1="0" y1="250" x2="0" y2="50"/>
      <line x1="-177" y1="-177" x2="-35" y2="-35"/>
      <line x1="177" y1="177" x2="35" y2="35"/>
      <line x1="177" y1="-177" x2="35" y2="-35"/>
      <line x1="-177" y1="177" x2="-35" y2="35"/>
    </g>
    
    <!-- Labels on rings -->
    <text x="0" y="-60" font-family="monospace" font-size="11" fill="#7a7a8a" text-anchor="middle">CONTEXT</text>
    <text x="0" y="-110" font-family="monospace" font-size="11" fill="#7a7a8a" text-anchor="middle">+ INSTRUCTIONS</text>
    <text x="0" y="-160" font-family="monospace" font-size="11" fill="#7a7a8a" text-anchor="middle">+ EXAMPLES</text>
    <text x="0" y="-210" font-family="monospace" font-size="11" fill="#7a7a8a" text-anchor="middle">+ DOMAIN KNOWLEDGE</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#00d4ff" text-anchor="middle" letter-spacing="4">CONTEXT ENGINEERING</text>
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="18" 
        fill="#7a7a8a" text-anchor="middle">For Coding Agents</text>
</svg>